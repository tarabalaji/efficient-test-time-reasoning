seed: 42

dataset:
  name: openai/gsm8k
  subset: main

  train_size: 500
  validation_size: 150
  test_size: 250

generation:
  model: gpt-4.1-mini
  attempts_per_question: 5
  temperature: 0.8
  max_output_tokens: 512

  prompt: |
    Solve the following math problem step by step.

    End your response with:
    Final answer: <number>

    Problem:
    {question}

controller:
  minimum_attempts: 2
  maximum_attempts: 5
  decision_stages:
    - 2
    - 3
    - 4

  models:
    - logistic_regression
    - xgboost

paths:
  raw_train: data/raw/gsm8k_train.jsonl
  raw_test: data/raw/gsm8k_test.jsonl
  questions: data/processed/questions.jsonl
  generations: data/generated/responses.jsonl
  snapshots: data/processed/snapshots.csv

  logistic_model: models/logistic_controller.pkl
  xgboost_model: models/xgboost_controller.pkl

  policy_results: results/policy_results.csv
  metrics: results/metrics.json